version: "3.9"

services:

  # ── 백엔드 (FastAPI) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: soccer_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DATABASE_URL=sqlite:///./soccer_analyzer.db
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./backend:/app               # 개발용 핫리로드
      - backend_uploads:/app/uploads
      - backend_db:/app/soccer_analyzer.db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── 프론트엔드 (Next.js) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps          # 개발 모드: deps 스테이지만 사용
    container_name: soccer_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev

volumes:
  backend_uploads:
  backend_db:
